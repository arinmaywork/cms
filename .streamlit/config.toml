[server]
fileWatcherType = "none"
# Max browser-upload size in MB (videos). Uploads buffer in RAM — on a 1 GB
# VM keep this ≤ 1024 and rely on the 3 GB swap for the occasional big file.
maxUploadSize = 1024

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor        = "#8b5cf6"
backgroundColor     = "#0f0f1a"
secondaryBackgroundColor = "#1a1a2e"
textColor           = "#e2e8f0"
font                = "sans serif"
