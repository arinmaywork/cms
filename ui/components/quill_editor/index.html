<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Quill snow theme -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
    }

    #editor-container {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    /* Quill toolbar styling */
    .ql-toolbar.ql-snow {
      border: none;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 8px 10px;
      flex-wrap: wrap;
    }

    .ql-container.ql-snow {
      border: none;
      font-size: 14px;
    }

    .ql-editor {
      min-height: 140px;
      padding: 12px 14px;
      line-height: 1.65;
    }

    .ql-editor.ql-blank::before {
      color: #9ca3af;
      font-style: italic;
    }

    /* Status bar */
    #status {
      font-size: 11px;
      color: #6b7280;
      padding: 4px 10px;
      text-align: right;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>

<div id="editor-container">
  <div id="editor"></div>
  <div id="status">0 chars</div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
  // ── Quill initialisation ──────────────────────────────────────────────────
  var quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Write or use AI Generate…',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        ['blockquote', 'link'],
        ['clean']
      ]
    }
  });

  var statusEl  = document.getElementById('status');
  var lastSentValue = '';   // avoid redundant postMessages
  var lastSetValue  = '';   // track what Python last sent us

  function updateStatus() {
    var len = quill.getText().trim().length;
    statusEl.textContent = len + ' chars';
  }

  // ── Send HTML back to Streamlit ───────────────────────────────────────────
  function sendValue() {
    var html = quill.root.innerHTML;
    // Treat empty Quill as empty string
    if (html === '<p><br></p>') html = '';
    if (html === lastSentValue) return;
    lastSentValue = html;
    updateStatus();
    window.parent.postMessage({
      type:       'streamlit:setComponentValue',
      value:      html,
      dataType:   'json',
    }, '*');
  }

  quill.on('text-change', function() {
    sendValue();
  });

  // ── Receive props from Streamlit ──────────────────────────────────────────
  window.addEventListener('message', function(event) {
    if (!event.data || event.data.type !== 'streamlit:render') return;

    var args = event.data.args || {};

    // height
    if (args.height) {
      document.getElementById('editor').style.minHeight = (args.height - 80) + 'px';
    }

    // placeholder
    if (args.placeholder) {
      quill.root.dataset.placeholder = args.placeholder;
    }

    // value — only update if Python explicitly sent new content
    // (i.e. value changed from what we last received from Python)
    if (typeof args.value === 'string' && args.value !== lastSetValue) {
      lastSetValue  = args.value;
      lastSentValue = args.value;   // avoid echo-back

      var selection = quill.getSelection();
      quill.root.innerHTML = args.value || '';
      updateStatus();

      // Restore cursor if user was editing (unlikely on AI inject, but safe)
      if (selection) {
        try { quill.setSelection(selection); } catch(e) {}
      }
    }
  });

  // ── Tell Streamlit we're ready ────────────────────────────────────────────
  window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, '*');

  // Also send initial empty value so Streamlit has a return value immediately
  window.parent.postMessage({
    type: 'streamlit:setComponentValue', value: '', dataType: 'json'
  }, '*');
</script>
</body>
</html>
